        --accent-alt: #ff8c42;

      }
      body {

        padding: 0;
        background-color: var(--bg);
        color: var(--text);
        font-family: 'Satoshi', system-ui, sans-serif;
        line-height: 1.6;

      }
      * {

      }

        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
      .toast {
        position: fixed;
        bottom: 1rem;
        left: 50%;
        transform: translateX(-50%);
        padding: 0.75rem 1.5rem;
        background-color: var(--text);
        color: var(--bg);
        border-radius: 0.375rem;
        font-size: 0.875rem;
        z-index: 50;
        opacity: 0;
        transform: translate(-50%, -100%);
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
        animation: slide-up 0.3s ease-out forwards, fade-out 0.3s ease-in 3.7s forwards;
      }
      @keyframes slide-up {
        from {
          transform: translate(-50%, 1rem);
          opacity: 0;
        }
        to {
          transform: translate(-50%, 0);
          opacity: 1;
        }
      }
      @keyframes fade-out {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }
